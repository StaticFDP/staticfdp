name: Publish FDP

# Runs on every push to main:
#   1. Generate SHACL from ShEx (ShEx is primary/canonical)
#   2. Generate all RDF serialisations (JSON-LD, N-Triples) from Turtle
#   3. Commit generated/ back to main
#   4. Invalidate the Cloudflare Worker cache for this repo
#   5. Ping the FDP index via GitHub Repository Dispatch
#      (no server needed — the index is itself a GitHub Actions workflow)

on:
  push:
    branches: [main]
    paths-ignore:
      - 'generated/**'    # avoid triggering ourselves on generated commits
      - '**.md'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # needed to commit generated/ back
      pages:    write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install tools
        run: |
          npm install -g @shexjs/cli
          pip install rdflib pyshex

      # ── STEP 1: ShEx → SHACL ────────────────────────────────────────────────
      - name: Generate SHACL from ShEx (ShEx is primary)
        run: |
          mkdir -p generated/profiles
          for f in profiles/*.shex; do
            [ -f "$f" ] || continue
            name=$(basename "$f" .shex)
            echo "→ $f → generated/profiles/${name}-SHACL.ttl"
            shex-to-shacl "$f" > "generated/profiles/${name}-SHACL.ttl" \
              || echo "⚠ Skipped (shex-to-shacl not available): $f"
          done

      # ── STEP 2: Turtle → JSON-LD + N-Triples ────────────────────────────────
      - name: Generate RDF serialisations from Turtle resources
        run: |
          python3 - <<'PYEOF'
          import glob, os
          from rdflib import Graph

          # Extensionless files in repo root and cases/ subtree
          candidates = (
            [f for f in os.listdir('.') if os.path.isfile(f)
              and '.' not in f and not f.startswith('.')]
            + glob.glob('cases/**/*', recursive=True)
          )

          resources = [
            f for f in candidates
            if os.path.isfile(f)
            and '.' not in os.path.basename(f)
            and not f.startswith(('.', 'generated'))
          ]

          os.makedirs('generated', exist_ok=True)

          for src in resources:
            try:
              g = Graph()
              g.parse(src, format='turtle')
              out_base = f"generated/{src}"
              os.makedirs(os.path.dirname(out_base) or '.', exist_ok=True)
              g.serialize(f"{out_base}.ttl",    format='turtle')
              g.serialize(f"{out_base}.jsonld", format='json-ld', indent=2)
              g.serialize(f"{out_base}.nt",     format='ntriples')
              print(f"✓ {src}  →  .ttl  .jsonld  .nt")
            except Exception as e:
              print(f"⚠ Skipped {src}: {e}")
          PYEOF

      # ── STEP 3a: Copy metadata Turtle into docs/fdp/ for GitHub Pages ───────
      - name: Publish Turtle metadata to docs/fdp/
        run: |
          mkdir -p docs/fdp
          cp metadata/fdp/*.ttl docs/fdp/
          # If submissions.ttl doesn't exist yet, create an empty stub
          if [ ! -f docs/fdp/submissions.ttl ]; then
            cat > docs/fdp/submissions.ttl <<'STUB'
@prefix dcat:    <https://www.w3.org/ns/dcat#> .
@prefix dcterms: <http://purl.org/dc/terms/> .
@prefix xsd:     <http://www.w3.org/2001/XMLSchema#> .
@prefix :        <https://fdp.semscape.org/ga4gh-rare-disease-trajectories/fdp/submissions/> .

# Community-submitted disease cases (auto-generated from GitHub Issues)
# This file is regenerated by the issues-to-turtle workflow.
STUB
          fi

      # ── STEP 3: Commit generated artifacts ──────────────────────────────────
      - name: Commit generated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add generated/ docs/fdp/
          git diff --staged --quiet && echo "Nothing to commit" && exit 0
          git commit -m "chore: regenerate derived artifacts [skip ci]"
          git push

      # ── STEP 4: Deploy docs/ to GitHub Pages ────────────────────────────────
      - name: Enable GitHub Pages (idempotent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/pages \
            --method POST \
            -f "source[branch]=main" \
            -f "source[path]=/docs" \
            2>/dev/null \
            && echo "✓ GitHub Pages enabled (main/docs)" \
            || echo "ℹ GitHub Pages already configured"

      # ── STEP 6: Invalidate Cloudflare Worker cache ───────────────────────────
      # The Worker reads pre-generated files from GitHub raw.
      # Writing a sentinel key to KV tells the Worker to re-fetch.
      - name: Invalidate Cloudflare Worker cache
        env:
          CF_API_TOKEN:  ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_NS_ID:   ${{ secrets.CF_KV_NS_ID }}
        run: |
          if [ -z "$CF_API_TOKEN" ]; then
            echo "ℹ No CF_API_TOKEN — skipping Cloudflare cache invalidation"
            exit 0
          fi
          curl -sf -X PUT \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: text/plain" \
            --data "$(date -u +%s)" \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/storage/kv/namespaces/${CF_KV_NS_ID}/values/invalidate%3A%3A${{ github.repository }}" \
          && echo "✓ Cloudflare cache invalidated" \
          || echo "⚠ Cloudflare invalidation failed (non-fatal)"

      # ── STEP 7: Ping FDP index via GitHub Repository Dispatch ────────────────
      # This triggers the fdp-index crawl workflow without any server.
      # Requires a fine-grained PAT (FDPINDEX_DISPATCH_TOKEN) with
      # contents:write on StaticFDP/fdp-index.
      - name: Ping FDP index
        env:
          FDPINDEX_TOKEN: ${{ secrets.FDPINDEX_DISPATCH_TOKEN }}
          FDP_ROOT_URL:   ${{ vars.FDP_ROOT_URL }}
        run: |
          if [ -z "$FDPINDEX_TOKEN" ]; then
            echo "ℹ No FDPINDEX_DISPATCH_TOKEN — skipping index ping"
            exit 0
          fi

          FDP_URL="${FDP_ROOT_URL:-https://${{ vars.FDP_SUBDOMAIN }}.fdpcloud.org/repository}"

          curl -sf -X POST \
            -H "Authorization: Bearer ${FDPINDEX_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            -d "{\"event_type\":\"fdp-ping\",\"client_payload\":{\"url\":\"${FDP_URL}\"}}" \
            "https://api.github.com/repos/StaticFDP/fdp-index/dispatches" \
          && echo "✓ FDP index pinged: ${FDP_URL}" \
          || echo "⚠ Index ping failed (non-fatal)"
